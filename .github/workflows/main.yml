name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Lint and Type Check
        # Uses the 'lint' script from your package.json: "tsc --noEmit"
        run: npm run lint

      - name: Build Frontend
        # Validates that Vite can successfully bundle the project
        run: npm run build

      # Note: If you add a 'test' script to package.json (e.g., using Vitest or Jest), 
      # uncomment the line below to run unit tests.
      # - name: Run Tests
      #   run: npm test

  build-and-push:
    needs: quality-and-tests # Only runs if linting and building succeed
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/the-party-den:v1.0.1
